<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Eventos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Cadastro de Eventos</h2>

        <div class="formulario">
            <input type="text" id="nome" placeholder="Nome">
            <input type="number" id="data" placeholder="Data">
            <input type="text" id="local" placeholder="Local">
            <input type="text" id="descrição" placeholder="Descrição">
            <button onclick="cadastrarEventos()">Cadastrar</button>
        </div>

        <h3>Lista de Eventos</h3>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Data</th>
                    <th>Local</th>
                    <th>Descrição</th>
                </tr>
            </thead>
            <tbody id="tabelaEventos"></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
