<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="styleLogin.css">
</head>

<body>

<div class="login-container">

<form id="usuario">

<h2>Login Usuário</h2>

<input type="text" id="userEmail" placeholder="user@tcc.com">
<input type="password" id="userPass" placeholder="123">

<button type="submit">Entrar</button>

</form>

<hr>

<form id="admin">

<h2>Login Admin</h2>

<input type="text" id="adminId" placeholder="admin">
<input type="password" id="adminPass" placeholder="1234">

<button type="submit">Entrar</button>

</form>

</div>


<script>

document.getElementById('usuario').addEventListener('submit', function(e){

e.preventDefault()

const email = document.getElementById("userEmail").value
const senha = document.getElementById("userPass").value

if(email === "user@tcc.com" && senha === "123"){

localStorage.setItem("tipoUsuario","comum")
window.location.href="usuario.html"

}else{

alert("Login inválido")

}

})


document.getElementById('admin').addEventListener('submit', async function(e){

e.preventDefault()

const usuario = document.getElementById("adminId").value
const senha = document.getElementById("adminPass").value

const resposta = await fetch("/api/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({usuario,senha})
})

const dados = await resposta.json()

if(dados.sucesso){

localStorage.setItem("tipoUsuario","admin")
window.location.href="index.html"

}else{

alert("Login admin inválido")

}

})

</script>

</body>
</html>
