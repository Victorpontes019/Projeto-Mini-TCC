<!DOCTYPE html>
<html>
<head>
<title>Painel Admin</title>
<link rel="stylesheet" href="style.css">

<script>
if(localStorage.getItem("tipoUsuario") !== "admin"){
window.location.href="login.html"
}
</script>

</head>

<body>

<button onclick="logout()">Sair</button>

<h1>Painel de Eventos</h1>

<input id="nome" placeholder="Nome">
<input id="data_evento" type="date">
<input id="local" placeholder="Local">
<input id="descricao" placeholder="Descrição">

<button onclick="cadastrarEvento()">Salvar</button>

<table border="1">

<thead>
<tr>
<th>ID</th>
<th>Nome</th>
<th>Data</th>
<th>Local</th>
<th>Descrição</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabelaEventos"></tbody>

</table>

<script src="script.js"></script>

<script>

function logout(){

localStorage.removeItem("tipoUsuario")

window.location.href="login.html"

}

</script>

</body>
</html>
